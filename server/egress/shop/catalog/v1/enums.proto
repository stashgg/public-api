syntax = "proto3";

package server.egress.shop.catalog.v1;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/stashgg/public-api/gen/proto/server/egress/shop/catalog/v1";

enum CatalogPlatform {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the platform of the user viewing the catalog"};
  // Default unknown platform
  CATALOG_PLATFORM_UNSPECIFIED = 0;
  CATALOG_PLATFORM_IOS = 1;
  CATALOG_PLATFORM_ANDROID = 2;
  CATALOG_PLATFORM_WEBSTORE = 3;
}

enum CatalogSectionDisplayType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Display type of a catalog section"};
  // Default responsive grid layout
  CATALOG_SECTION_DISPLAY_TYPE_UNSPECIFIED = 0;
  // Carousel displays items in a horizontal scrollable area
  CATALOG_SECTION_DISPLAY_TYPE_CAROUSEL = 1;
  // Popup displays section content in an overlay (e.g. daily streak)
  CATALOG_SECTION_DISPLAY_TYPE_POPUP = 2;
}

enum CatalogGroupDisplayType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Display type of a catalog group within a section (optional per-group layout override)"};
  // Inherit section display behavior
  CATALOG_GROUP_DISPLAY_TYPE_UNSPECIFIED = 0;
  // Sliding window displays items in a horizontal scrollable area (e.g. peek of next card)
  CATALOG_GROUP_DISPLAY_TYPE_SLIDING_WINDOW = 1;
  // Full single-item carousel with pagination dots (different from sliding window peek)
  CATALOG_GROUP_DISPLAY_TYPE_CAROUSEL = 2;
}

enum PurchasableItemType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the type of purchasable item"};
  // Default purchasable item type
  PURCHASABLE_ITEM_TYPE_UNSPECIFIED = 0;
  PURCHASABLE_ITEM_TYPE_STANDARD_OFFER = 1;
  PURCHASABLE_ITEM_TYPE_BUNDLE_OFFER = 2;
}

enum NonPurchasableItemType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the type of non-purchasable item"};
  // Default non-purchasable item type
  NON_PURCHASABLE_ITEM_TYPE_UNSPECIFIED = 0;
  // Banner type non-purchasable item for emphasized full-width display
  NON_PURCHASABLE_ITEM_TYPE_BANNER = 1;
}

enum ChainLinkStatus {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the status of a chain link"};
  CHAIN_LINK_STATUS_UNSPECIFIED = 0;
  CHAIN_LINK_STATUS_CLAIMED = 1;
  CHAIN_LINK_STATUS_UNLOCKED = 2;
  CHAIN_LINK_STATUS_LOCKED = 3;
}

enum RewardBuffType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the type of reward buff applied to an item"};
  REWARD_BUFF_TYPE_UNSPECIFIED = 0;
  // Renders the percentage as an additive reward, e.g. +20%
  REWARD_BUFF_TYPE_ADDITIVE = 1;
  // Renders the percentage as a multiplier, e.g. 3x
  REWARD_BUFF_TYPE_MULTIPLIER = 2;
}

enum ContentItemType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the type of content item"};
  // Default content item type
  CONTENT_ITEM_TYPE_UNSPECIFIED = 0;
  // Web store bonus content item type
  CONTENT_ITEM_TYPE_WEB_STORE_BONUS = 1;
}

enum BadgeAction {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the action associated with a badge"};
  // Default badge action (no action)
  BADGE_ACTION_UNSPECIFIED = 0;
  // Show the details of the offer contents, e.g. loot boxes with drop rates
  BADGE_ACTION_SHOW_OFFER_DETAILS = 1;
}

enum ContentItemClickAction {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the action associated with clicking a content item"};
  // Default click action (no action)
  CONTENT_ITEM_CLICK_ACTION_UNSPECIFIED = 0;
  // Show item details for the content item by guid. The guid field must be set in order to view details for the relevant item in the OfferDetails response.
  CONTENT_ITEM_CLICK_ACTION_SHOW_DETAILS_BY_ID = 1;
}

enum CellAlignment {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Represents the horizontal alignment of cell content"};
  // Default alignment (typically START)
  CELL_ALIGNMENT_UNSPECIFIED = 0;
  // Align content to the start (left in LTR layouts)
  CELL_ALIGNMENT_START = 1;
  // Center align content
  CELL_ALIGNMENT_CENTER = 2;
  // Align content to the end (right in LTR layouts)
  CELL_ALIGNMENT_END = 3;
}

enum CatalogOfferDisplaySize {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Display size for offer cards within a catalog group"};
  // Default (inherits section or theme default)
  CATALOG_OFFER_DISPLAY_SIZE_UNSPECIFIED = 0;
  CATALOG_OFFER_DISPLAY_SIZE_SMALL = 1;
  CATALOG_OFFER_DISPLAY_SIZE_MEDIUM = 2;
  CATALOG_OFFER_DISPLAY_SIZE_LARGE = 3;
}

enum CatalogBorderType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Border decoration type for a catalog offer card"};
  // Default / no border decoration
  CATALOG_BORDER_TYPE_UNSPECIFIED = 0;
  // Color gradient border matching shop theme
  CATALOG_BORDER_TYPE_GRADIENT = 1;
}

enum FreeItemStatus {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Claim status of a free catalog item"};
  FREE_ITEM_STATUS_UNSPECIFIED = 0;
  FREE_ITEM_STATUS_AVAILABLE = 1;
  FREE_ITEM_STATUS_CLAIMED = 2;
  FREE_ITEM_STATUS_LOCKED = 3;
  FREE_ITEM_STATUS_EXPIRED = 4;
}

enum BonusType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Type of bonus granted with a free item claim"};
  BONUS_TYPE_UNSPECIFIED = 0;
  BONUS_TYPE_IN_GAME_CURRENCY = 1;
  BONUS_TYPE_LOYALTY_POINTS = 2;
  BONUS_TYPE_LOYALTY_CURRENCY = 3;
}

enum CatalogTriggerDisplayType {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_enum) = {description: "Display placement for a catalog UI trigger"};
  CATALOG_TRIGGER_DISPLAY_TYPE_UNSPECIFIED = 0;
  CATALOG_TRIGGER_DISPLAY_TYPE_FLOATING = 1;
}
