syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package server.ingress;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/stashgg/public-api/gen/proto/server/ingress";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Stash Managed Catalog API"
    description: "Read-only API for querying the Stash managed product catalog. Partner-facing documentation and OpenAPI specs are generated from pie.sdk.catalogue in pie-mono and published at https://docs.stash.gg/api (Managed Catalog section) and docs/gen/redoc.ingress.v1.html."
    version: "1.0"
    contact: {
      name: "API Support"
      url: "https://docs.stash.gg/"
      email: "help@stash.gg"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "apiKey"
      value: {
        name: "X-Stash-Api-Key"
        in: IN_HEADER
        type: TYPE_API_KEY
        description: "API key authentication for server-side SDK operations. Pass your Stash Studio API secret in the X-Stash-Api-Key header."
      }
    }
  }
};
