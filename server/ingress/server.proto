syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package server.ingress;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/stashgg/public-api/gen/proto/server/ingress";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Stash Managed Catalog API"
    description: "Read-only API for querying the Stash managed product catalog. Designed for server-to-server communication between partner backends and Stash services."
    version: "1.0"
    contact: {
      name: "API Support"
      url: "https://docs.stash.gg/"
      email: "help@stash.gg"
    }
  }
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "hmac"
      value: {
        name: "x-stash-hmac-signature"
        in: IN_HEADER
        type: TYPE_API_KEY
        description: "Versioned HMAC-SHA256 signature for server-to-server requests to this API (your backend calling Stash), as opposed to client-side operations. Recommended over the deprecated legacyHmac scheme for the best security. Header format: v1;{shopId};{unixMillisTimestamp};{base64Signature} (semicolon-delimited). {base64Signature} is the base64-encoded HMAC-SHA256 of the string {unixMillisTimestamp}.{requestBody} signed with your Ingress API key, where {requestBody} is the compact request JSON for POST requests and empty for GET requests. The timestamp must be within 5 minutes of Stash server time. Your shopId is your immutable shop identifier; it and your Ingress API key are available in Stash Studio under Project Settings > API Secrets."
      }
    }
    security: {
      key: "legacyHmac"
      value: {
        name: "stash-hmac-signature"
        in: IN_HEADER
        type: TYPE_API_KEY
        description: "DEPRECATED: use the versioned hmac scheme (x-stash-hmac-signature) instead for the best security. HMAC-SHA256 signature generated by signing the request body (empty string for GET requests) with the Ingress API key from Stash Studio. Base64-encoded."
      }
    }
  }
};
